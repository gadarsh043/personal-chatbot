projects:
  - name: Rahify
    description: >
      AI-Powered Travel Planning Platform. Solo-built SaaS with 200+ users in first week. 
      Zero-hallucination itineraries using "Places First" architecture: fetches 80-100 verified 
      places via Google Places API before LLM generates. Multi-phase pipeline: place retrieval, 
      itinerary generation, cost breakdown in 150+ currencies, live flight search, and interactive 
      maps. SSE streaming for progressive UI rendering, Google OAuth, Stripe payments, PDF export.
    technologies:
      - React
      - FastAPI
      - Supabase
      - Groq/Llama 3
      - Google Places API
      - SerpAPI
      - Tailwind CSS v4
      - Stripe
      - Zustand
      - Railway
      - PostHog
    github: https://github.com/gadarsh043/rahi-ai
    live: https://rahify.com
    category: AI & ML
    impact: "200+ users in first week, zero hallucinated locations"
    architecture: >
      Places First, AI Second. Fetches verified data from Google Places API before the AI 
      generates anything. The LLM arranges real places into itineraries, never invents them.

  - name: RoleLens AI
    description: >
      RAG-powered resume-to-job-description fit analyzer. Chunks resume by section, embeds locally 
      via sentence-transformers, stores vectors in ChromaDB, retrieves relevant chunks per query, 
      and generates structured fit reports (score, skill gaps, radar analysis) via Groq. Follow-up 
      Q&A re-retrieves on every message for grounded responses. Reduces hallucination risk because 
      generation is constrained by retrieved evidence from the user's own resume text.
    technologies:
      - React
      - FastAPI
      - ChromaDB
      - sentence-transformers
      - Groq/Llama 3
      - Vite
    github: https://github.com/gadarsh043/RoleLens-AI
    live: https://rolelens.adarshgella.com
    category: AI & ML
    impact: "Full RAG pipeline with local embeddings, vector storage, and retrieval-grounded generation"
    architecture: >
      True RAG: User query converted to embedding via sentence-transformers, searched against 
      ChromaDB vector store, top-k relevant resume chunks retrieved with metadata, fed to Groq 
      LLM alongside the query for grounded structured output.

